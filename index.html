<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Positionnement de Transparence Managériale · Management Régénératif</title>
<meta name="description" content="Où en êtes-vous sur l'échelle de transparence managériale ? 30 questions pour situer votre niveau.">
<meta name="author" content="Benjamin Chaminade">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔓</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0D0F0E;
  --bg2:     #131614;
  --bg3:     #1A1D1B;
  --surface: #202422;
  --border:  rgba(255,255,255,.08);
  --border2: rgba(255,255,255,.14);
  --text:    #F0EDE6;
  --muted:   #8A8A80;
  --faint:   #3A3D3B;

  --n0: #E05252; --n0d: rgba(224,82,82,.12);
  --n1: #E07040; --n1d: rgba(224,112,64,.12);
  --n2: #C89030; --n2d: rgba(200,144,48,.12);
  --n3: #5AAA60; --n3d: rgba(90,170,96,.12);
  --n4: #4A90D0; --n4d: rgba(74,144,208,.12);
  --n5: #8A70E0; --n5d: rgba(138,112,224,.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  min-height: 100vh;
}

h1, h2, h3 {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
}

.app { max-width: 840px; margin: 0 auto; padding: 24px 16px 80px; }

/* ── HEADER ──────────────────────────────────── */
.header {
  padding: 64px 0 52px;
  position: relative;
  overflow: hidden;
}
.header-bg-num {
  position: absolute;
  top: -20px; right: -20px;
  font-family: 'Playfair Display', serif;
  font-size: 220px;
  font-weight: 900;
  color: rgba(255,255,255,.025);
  line-height: 1;
  pointer-events: none;
  user-select: none;
}
.header-tag {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: .7rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  padding: 6px 14px; border-radius: 20px;
  background: rgba(90,170,96,.15);
  color: var(--n3);
  border: 1px solid rgba(90,170,96,.25);
  margin-bottom: 22px;
}
.header h1 {
  font-size: clamp(2rem, 6vw, 3.4rem);
  font-weight: 900;
  color: var(--text);
  line-height: 1.1;
  margin-bottom: 18px;
  letter-spacing: -.02em;
}
.header h1 em {
  font-style: italic;
  color: var(--n3);
}
.header .sub {
  font-size: 1rem;
  color: var(--muted);
  max-width: 580px;
  font-weight: 300;
  line-height: 1.75;
}
.header-divider {
  width: 60px; height: 2px;
  background: linear-gradient(90deg, var(--n1), var(--n3), var(--n5));
  margin: 28px 0;
  border-radius: 2px;
}

/* ── LADDER PREVIEW ──────────────────────────── */
.ladder {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
  margin: 32px 0;
}
.ladder-step {
  padding: 14px 8px 12px;
  border-radius: 10px;
  text-align: center;
  border: 1px solid var(--border);
  background: var(--bg2);
  transition: transform .2s, border-color .2s;
  cursor: default;
}
.ladder-step:hover { transform: translateY(-3px); }
.ls-num {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem; font-weight: 900;
  line-height: 1; margin-bottom: 5px;
}
.ls-label {
  font-size: .64rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em;
  color: var(--muted);
}

/* ── INTRO CARD ──────────────────────────────── */
.intro-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px;
  margin-bottom: 28px;
}
.intro-card h2 {
  font-size: 1.4rem; color: var(--text);
  margin-bottom: 14px;
}
.intro-card p { font-size: .93rem; color: var(--muted); margin-bottom: 16px; line-height: 1.7; }
.dims-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}
.dim-pill {
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
}
.dim-pill-name { font-size: .8rem; font-weight: 600; margin-bottom: 3px; }
.dim-pill-desc { font-size: .73rem; color: var(--muted); line-height: 1.4; }
.note-box {
  background: rgba(200,144,48,.1);
  border-left: 3px solid var(--n2);
  border-radius: 0 8px 8px 0;
  padding: 13px 16px;
  font-size: .86rem;
  color: #D4A84A;
}

/* ── START BUTTON ────────────────────────────── */
.btn-start {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 40px;
  background: var(--n3);
  color: #0D1A0F;
  border: none; border-radius: 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 1rem; font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .02em;
}
.btn-start:hover { background: #6DC075; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(90,170,96,.3); }

/* ── PROGRESS ────────────────────────────────── */
.progress-wrap { margin-bottom: 24px; }
.progress-meta {
  display: flex; justify-content: space-between;
  font-size: .75rem; font-weight: 600; color: var(--muted);
  margin-bottom: 8px;
}
.pbar { height: 3px; background: var(--faint); border-radius: 2px; }
.pbar-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--n1), var(--n3), var(--n5));
  transition: width .5s ease;
}

/* ── DIM TABS ────────────────────────────────── */
.dim-tabs { display: flex; gap: 4px; margin-bottom: 22px; flex-wrap: wrap; }
.dim-tab {
  flex: 1; min-width: 72px;
  padding: 9px 6px; border-radius: 10px;
  font-size: .65rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
  text-align: center;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--muted);
  transition: all .2s;
}
.dim-tab:hover { border-color: var(--border2); color: var(--text); }
.dim-tab.active { border-color: currentColor; background: var(--bg3); }
.dim-tab.done { opacity: .65; }

/* ── DIM HEADER ──────────────────────────────── */
.dim-header {
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 20px;
  border: 1px solid;
}
.dim-header-name {
  font-size: .72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em;
  margin-bottom: 5px;
}
.dim-header-desc { font-size: .84rem; color: var(--muted); line-height: 1.6; }
.dim-header-ref { font-size: .72rem; font-weight: 600; margin-top: 6px; }

/* ── QUESTION CARD ───────────────────────────── */
.q-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  margin-bottom: 14px;
  animation: fadeUp .3s ease;
  transition: border-color .2s;
}
.q-card.answered { border-color: var(--border2); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.q-num {
  font-size: .68rem; font-weight: 700;
  color: var(--muted); text-transform: uppercase; letter-spacing: .07em;
  margin-bottom: 8px;
}
.q-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.02rem; font-weight: 400;
  color: var(--text); line-height: 1.65;
  margin-bottom: 12px;
}
.q-context {
  font-size: .78rem; color: var(--muted);
  font-style: italic; line-height: 1.55;
  margin-bottom: 18px;
  padding-left: 12px;
  border-left: 2px solid var(--faint);
}

/* ── RATING ──────────────────────────────────── */
.rating-wrap { display: flex; gap: 6px; }
.rb {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 12px 4px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg3);
  color: var(--muted);
  font-family: 'Outfit', sans-serif;
  font-size: .67rem; font-weight: 600;
  cursor: pointer;
  transition: all .18s;
  text-align: center;
}
.rb:hover { border-color: var(--border2); color: var(--text); transform: translateY(-2px); }
.rb.sel {
  color: #0D1A0F;
  border-color: transparent;
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
}
.rb-val {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem; font-weight: 700;
  line-height: 1;
}

/* ── NAV ─────────────────────────────────────── */
.nav-btns { display: flex; justify-content: space-between; gap: 12px; margin-top: 24px; }
.btn {
  padding: 11px 24px; border: none; border-radius: 10px;
  font-family: 'Outfit', sans-serif; font-size: .88rem; font-weight: 600;
  cursor: pointer; transition: all .2s;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-sec {
  background: var(--bg3); color: var(--muted);
  border: 1px solid var(--border);
}
.btn-sec:hover { color: var(--text); border-color: var(--border2); }
.btn-next { background: var(--n3); color: #0D1A0F; }
.btn-next:hover { background: #6DC075; transform: translateY(-1px); }
.btn-next:disabled { background: var(--faint); color: var(--muted); cursor: not-allowed; transform: none; }
.btn-dl { background: var(--n2); color: #1A1200; }
.btn-dl:hover { background: #D9A040; transform: translateY(-1px); }

/* ── RESULTS ─────────────────────────────────── */
.result-hero {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 40px;
  text-align: center;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.result-hero-bg {
  position: absolute;
  top: -40px; left: 50%; transform: translateX(-50%);
  font-family: 'Playfair Display', serif;
  font-size: 280px; font-weight: 900;
  opacity: .04; line-height: 1;
  pointer-events: none; user-select: none;
  white-space: nowrap;
}
.result-niv-tag {
  display: inline-block;
  font-size: .7rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  padding: 5px 16px; border-radius: 20px;
  margin-bottom: 16px;
}
.result-niv-name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 7vw, 3.6rem);
  font-weight: 900; letter-spacing: -.02em;
  margin-bottom: 6px;
}
.result-score { font-size: .92rem; color: var(--muted); margin-bottom: 20px; }
.result-scorebar {
  width: 100%; max-width: 400px;
  height: 6px; background: var(--faint);
  border-radius: 3px; overflow: hidden;
  margin: 0 auto 24px;
}
.result-scorefill { height: 100%; border-radius: 3px; transition: width 1.2s ease; }
.result-desc {
  font-size: .95rem; color: var(--muted);
  max-width: 580px; margin: 0 auto 24px;
  line-height: 1.8; font-weight: 300;
}
.result-action {
  border-radius: 12px; padding: 14px 20px;
  max-width: 520px; margin: 0 auto 24px;
  text-align: left;
  border: 1px solid;
}
.result-action-label {
  font-size: .68rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em;
  margin-bottom: 6px;
}
.result-action p { font-size: .88rem; line-height: 1.65; }

/* ── RESULT TABS ─────────────────────────────── */
.res-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
.res-tab {
  flex: 1; padding: 10px;
  background: var(--bg2); color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: 'Outfit', sans-serif;
  font-size: .8rem; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.res-tab.active { color: var(--text); border-color: var(--border2); background: var(--bg3); }

/* ── DIM SCORES ──────────────────────────────── */
.dim-scores-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 30px;
  margin-bottom: 20px;
}
.dim-scores-card h2 { font-size: 1.3rem; color: var(--text); margin-bottom: 22px; }
.ds-row { margin-bottom: 18px; }
.ds-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.ds-name { font-size: .88rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.ds-val { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; }
.ds-bar { height: 6px; background: var(--faint); border-radius: 3px; overflow: hidden; }
.ds-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
.ds-niv { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-top: 4px; }

/* ── RECO ────────────────────────────────────── */
.reco-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-left-width: 3px;
  border-radius: 0 14px 14px 0;
  padding: 22px 24px;
  margin-bottom: 14px;
}
.reco-card h3 {
  font-size: 1rem; font-family: 'Playfair Display', serif;
  color: var(--text); margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
}
.reco-card p { font-size: .86rem; color: var(--muted); line-height: 1.7; }
.step-dot {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .68rem; font-weight: 700; color: var(--bg);
  flex-shrink: 0;
}

/* ── DETAIL ──────────────────────────────────── */
.det-section {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 22px 24px;
  margin-bottom: 14px;
}
.det-section-head {
  font-size: .9rem; font-weight: 700;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.det-row {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 0; border-bottom: 1px solid var(--faint);
  font-size: .78rem;
}
.det-row:last-child { border-bottom: none; }
.det-dot {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .7rem;
  flex-shrink: 0;
}
.det-txt { flex: 1; color: var(--muted); font-style: italic; line-height: 1.4; }
.det-val { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; flex-shrink: 0; }

/* ── CONSEIL BOX ─────────────────────────────── */
.conseil-box {
  border-radius: 12px; padding: 18px 22px;
  margin-bottom: 18px; border: 1px solid;
}
.conseil-box-label {
  font-size: .68rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em;
  margin-bottom: 8px;
}
.conseil-box p { font-size: .88rem; line-height: 1.7; }

.foot {
  text-align: center; padding: 40px 20px 20px;
  font-size: .73rem; color: var(--faint); line-height: 2;
}

@media (max-width: 600px) {
  .ladder { grid-template-columns: repeat(3, 1fr); }
  .dims-grid { grid-template-columns: 1fr; }
  .q-card { padding: 20px; }
  .rating-wrap { gap: 4px; }
  .rb { padding: 10px 3px; font-size: .6rem; }
  .rb-val { font-size: 1.2rem; }
  .result-hero { padding: 32px 20px; }
  .dim-scores-card { padding: 20px 16px; }
  .res-tabs { flex-wrap: wrap; }
  .header h1 { font-size: 1.8rem; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script>var ow=console.warn;console.warn=function(m){if(typeof m==='string'&&m.indexOf('in-browser Babel')!==-1)return;ow.apply(console,arguments)};</script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState } = React;

const DIMENSIONS = [
  { id:"operationnelle", label:"Opérationnelle", icon:"⚙", color:"#E07040", colorD:"rgba(224,112,64,.14)", chapRef:"Chapitre 10", desc:"Partager les objectifs, les contraintes et les critères de décision de chaque projet · la base qui permet à chacun de comprendre le « pourquoi » de son action." },
  { id:"tactique",       label:"Tactique",       icon:"◈", color:"#5AAA60", colorD:"rgba(90,170,96,.14)",  chapRef:"Chapitre 10", desc:"Ouvrir l'accès aux indicateurs de performance, aux retours clients et aux analyses. Cette information nourrit la prise de décision collective." },
  { id:"strategique",    label:"Stratégique",    icon:"◎", color:"#4A90D0", colorD:"rgba(74,144,208,.14)", chapRef:"Chapitre 10", desc:"Exposer les choix d'orientation, les défis économiques et les opportunités. Cette vision transforme vos collaborateurs en partenaires de la réussite." },
  { id:"relationnelle",  label:"Relationnelle",  icon:"◉", color:"#9A70C8", colorD:"rgba(154,112,200,.14)",chapRef:"Chapitre 10", desc:"Qualité du feedback, reconnaissance des erreurs, cohérence entre ce qui est dit et ce qui est fait." },
  { id:"temporelle",     label:"Temporelle",     icon:"◷", color:"#50A8B0", colorD:"rgba(80,168,176,.14)", chapRef:"Chapitre 4",  desc:"Partager les rythmes, les priorités changeantes, les délais réels et les tensions entre court et long terme." },
];

const QUESTIONS = [
  { id:"o1", dim:"operationnelle", texte:"Je communique systématiquement les objectifs de chaque projet ainsi que les contraintes qui encadrent les décisions.", context:"Ex : budget, délais imposés, dépendances organisationnelles, non-négociables." },
  { id:"o2", dim:"operationnelle", texte:"Mes collaborateurs comprennent pourquoi les décisions sont prises, pas seulement ce qu'ils doivent faire.", context:"Le « pourquoi » avant le « comment » · c'est la base de l'autonomie réelle." },
  { id:"o3", dim:"operationnelle", texte:"Je partage les critères que j'utilise pour prendre mes décisions, même quand elles sont impopulaires.", context:"Ex : critère de priorisation, arbitrage ressources, choix d'une mission sur une autre." },
  { id:"o4", dim:"operationnelle", texte:"Mes collaborateurs connaissent les règles du jeu de leur rémunération : les critères, la logique, la progression possible.", context:"Ils n'ont pas nécessairement accès aux chiffres des autres, mais ils comprennent la structure." },
  { id:"o5", dim:"operationnelle", texte:"Quand une contrainte organisationnelle m'empêche d'agir autrement, je l'explique plutôt que de laisser mon équipe interpréter.", context:"L'opacité sur les contraintes génère méfiance et sentiment d'injustice." },
  { id:"o6", dim:"operationnelle", texte:"Je communique les fourchettes salariales par poste ou les critères objectifs qui les déterminent.", context:"Conforme aux exigences de la directive (UE) 2023/970 attendue en juin 2026." },
  { id:"t1", dim:"tactique", texte:"Mes collaborateurs ont accès aux indicateurs de performance de l'équipe en temps quasi-réel, pas seulement en fin de trimestre.", context:"Tableaux de bord partagés, OKR visibles, résultats accessibles sans intermédiaire." },
  { id:"t2", dim:"tactique", texte:"Je partage régulièrement les retours clients · positifs comme négatifs · avec l'ensemble de l'équipe.", context:"L'équipe qui n'entend jamais les clients perd le sens de son action." },
  { id:"t3", dim:"tactique", texte:"Mes collaborateurs comprennent la position de notre équipe vis-à-vis des autres équipes ou de la concurrence.", context:"Analyses concurrentielles, benchmarks internes, positionnement sur les projets transverses." },
  { id:"t4", dim:"tactique", texte:"Quand les résultats sont mauvais, je l'annonce clairement et j'explique les causes plutôt que de minimiser.", context:"La transparence sur les difficultés est plus régénérative que le management par les bonnes nouvelles." },
  { id:"t5", dim:"tactique", texte:"Mes collaborateurs savent comment leurs actions individuelles contribuent aux résultats collectifs.", context:"Traçabilité de l'impact : chacun voit le lien entre son travail et les indicateurs de l'équipe." },
  { id:"t6", dim:"tactique", texte:"Je partage les analyses d'échecs et les post-mortems avec l'équipe, pas seulement les succès.", context:"L'erreur fertile : l'apprentissage collectif exige la transparence sur ce qui n'a pas fonctionné." },
  { id:"s1", dim:"strategique", texte:"Mes collaborateurs comprennent les enjeux économiques de l'organisation, pas seulement leur périmètre immédiat.", context:"Marges, pression budgétaire, enjeux de financement, risques stratégiques." },
  { id:"s2", dim:"strategique", texte:"Je partage les choix d'orientation et les arbitrages stratégiques, y compris ceux qui m'ont été difficiles.", context:"Les décisions qui touchent l'équipe doivent être expliquées, pas seulement annoncées." },

function getTotalScore(rep) { return QUESTIONS.reduce((s,q)=>s+(rep[q.id]||0),0); }
function getDimScore(rep,id) { return QUESTIONS.filter(q=>q.dim===id).reduce((s,q)=>s+(rep[q.id]||0),0); }
function getDimMax(id) { return QUESTIONS.filter(q=>q.dim===id).length*5; }
function getNiveau(score) { return NIVEAUX.find(n=>score>=n.range[0]&&score<=n.range[1])||NIVEAUX[0]; }
function getDimNiv(pct) {
  if(pct>=.8) return {label:"Avancé",   color:"#5AAA60"};
  if(pct>=.6) return {label:"Développé",color:"#C89030"};
  if(pct>=.4) return {label:"Émergent", color:"#E07040"};
  return {label:"À initier",color:"#E05252"};
}
function getDone(rep) { return QUESTIONS.filter(q=>rep[q.id]).length; }

function generateWord(rep) {
  const score=getTotalScore(rep),niv=getNiveau(score);
  const profil=PROFILS_MANAGER[niv.num]||PROFILS_MANAGER[0];
  const directive=DIRECTIVE_INFO[niv.num]||DIRECTIVE_INFO[0];
  const recos=RECOS[niv.num]||RECOS[0];
  const date=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});

  // ── Radar SVG en couleur pour Word ─────────────────────────
  const cx=200,cy=200,R=140,sides=5;
  const ang=(i)=>(Math.PI*2*i/sides)-Math.PI/2;
  const pt=(i,r)=>({x:cx+R*r*Math.cos(ang(i)),y:cy+R*r*Math.sin(ang(i))});
  const gridPoly=(r)=>DIMENSIONS.map((_,i)=>{const p=pt(i,r);return `${p.x},${p.y}`;}).join(" ");
  const scores=DIMENSIONS.map(d=>getDimScore(rep,d.id)/getDimMax(d.id));
  const scorePoly=DIMENSIONS.map((_,i)=>{const p=pt(i,scores[i]);return `${p.x},${p.y}`;}).join(" ");
  const labelOff=28;
  const lp=(i)=>{const a=ang(i);return{x:cx+(R+labelOff)*Math.cos(a),y:cy+(R+labelOff)*Math.sin(a)};};
  const globalPct=Math.round(score/150*100);

  let radarSVG=`<svg xmlns='http://www.w3.org/2000/svg' width='420' height='420' viewBox='0 0 400 400' style='display:block;margin:0 auto'>`;
  radarSVG+=`<rect width='400' height='400' fill='#F8F8F5' rx='8'/>`;
  [.2,.4,.6,.8,1].forEach((r,li)=>{
    radarSVG+=`<polygon points='${gridPoly(r)}' fill='none' stroke='${li===4?"#AAAAAA":"#DDDDDD"}' stroke-width='${li===4?1:.5}'/>`;
  });
  DIMENSIONS.forEach((_,i)=>{const p=pt(i,1);radarSVG+=`<line x1='${cx}' y1='${cy}' x2='${p.x}' y2='${p.y}' stroke='#DDDDDD' stroke-width='.5'/>`;});
  radarSVG+=`<polygon points='${scorePoly}' fill='${niv.color}33' stroke='${niv.color}' stroke-width='2' stroke-linejoin='round'/>`;
  DIMENSIONS.forEach((d,i)=>{const p=pt(i,scores[i]);radarSVG+=`<circle cx='${p.x}' cy='${p.y}' r='5' fill='${d.color}' stroke='#fff' stroke-width='1.5'/>`;});
  radarSVG+=`<circle cx='${cx}' cy='${cy}' r='18' fill='${niv.color}33' stroke='${niv.color}' stroke-width='1'/>`;
  radarSVG+=`<text x='${cx}' y='${cy+1}' text-anchor='middle' dominant-baseline='central' style='font-size:11px;font-weight:bold;fill:${niv.color}'>${globalPct}%</text>`;
  DIMENSIONS.forEach((d,i)=>{
    const l=lp(i);
    const s=getDimScore(rep,d.id),max=getDimMax(d.id);
    const a=ang(i)*180/Math.PI;
    const anchor=Math.abs(a+90)<20||Math.abs(a-90)<20||Math.abs(a+270)<20?"middle":l.x>cx?"start":"end";
    radarSVG+=`<text x='${l.x}' y='${l.y-5}' text-anchor='${anchor}' style='font-size:10px;font-weight:600;fill:${d.color}'>${d.label}</text>`;
    radarSVG+=`<text x='${l.x}' y='${l.y+8}' text-anchor='${anchor}' style='font-size:9px;fill:#888'>${s}/${max}</text>`;

// ── RADAR CHART ───────────────────────────────────────────────
function RadarChart({ rep, niv }) {
  const [animated, setAnimated] = React.useState(false);
  React.useEffect(() => { const t = setTimeout(() => setAnimated(true), 100); return () => clearTimeout(t); }, []);

  const cx = 200, cy = 200, R = 150, sides = 5;
  const dims = DIMENSIONS;

  // Calcul des scores normalisés (0-1)
  const scores = dims.map(d => {
    const s = getDimScore(rep, d.id);
    const max = getDimMax(d.id);
    return s / max;
  });

  // Score global normalisé
  const totalScore = getTotalScore(rep);
  const globalPct = totalScore / 150;

  // Angle de départ : haut (−π/2)
  const angle = (i) => (Math.PI * 2 * i / sides) - Math.PI / 2;

  // Point sur l'axe à distance r (0-1)
  const pt = (i, r) => ({
    x: cx + R * r * Math.cos(angle(i)),
    y: cy + R * r * Math.sin(angle(i)),
  });

  // Grille : cercles à 20%, 40%, 60%, 80%, 100%
  const gridLevels = [.2, .4, .6, .8, 1];

  // Polygone de la grille
  const gridPoly = (r) => dims.map((_,i) => {
    const p = pt(i, r);
    return `${p.x},${p.y}`;
  }).join(" ");

  // Polygone des scores (animé)
  const scorePoly = dims.map((_,i) => {
    const p = pt(i, animated ? scores[i] : 0);
    return `${p.x},${p.y}`;
  }).join(" ");

  // Labels axes
  const labelOffset = 22;
  const labelPt = (i) => {
    const a = angle(i);
    return {
      x: cx + (R + labelOffset) * Math.cos(a),
      y: cy + (R + labelOffset) * Math.sin(a),
    };
  };

  return (
    <div style={{
      background:"var(--bg2)",
      border:"1px solid var(--border)",
      borderRadius:16,
      padding:"24px 16px 16px",
      marginBottom:20,
    }}>
      <div style={{textAlign:"center",marginBottom:4}}>
        <div style={{fontSize:".68rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",color:"var(--muted)",marginBottom:6}}>
          Radar de transparence
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:20,flexWrap:"wrap"}}>
        <svg width="400" height="400" viewBox="0 0 400 400" style={{maxWidth:"100%",overflow:"visible"}}>
          {/* Grille */}
          {gridLevels.map((r,li) => (
            <polygon key={li}
              points={gridPoly(r)}
              fill="none"
              stroke={li===4?"rgba(255,255,255,.15)":"rgba(255,255,255,.06)"}
              strokeWidth={li===4?.8:.5}
            />
          ))}
          {/* Axes */}
          {dims.map((_,i) => {
            const p = pt(i, 1);
            return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="rgba(255,255,255,.08)" strokeWidth=".5"/>;
          })}
          {/* Zone score · animée */}
          <polygon
            points={scorePoly}
            fill={`${niv.color}22`}
            stroke={niv.color}
            strokeWidth="1.5"
            strokeLinejoin="round"
            style={{transition:"all 1.2s cubic-bezier(.4,0,.2,1)"}}
          />
          {/* Points sur les axes */}
          {dims.map((_,i) => {
            const p = pt(i, animated ? scores[i] : 0);
            return (
              <circle key={i} cx={p.x} cy={p.y} r="4"
                fill={niv.color}
                stroke="var(--bg2)"
                strokeWidth="2"
                style={{transition:`all 1.2s cubic-bezier(.4,0,.2,1) ${i*80}ms`}}
              />
            );
          })}
          {/* Centre · score global */}
          <circle cx={cx} cy={cy} r={animated ? R * globalPct * .18 + 6 : 6}
            fill={`${niv.color}40`} stroke={niv.color} strokeWidth="1"
            style={{transition:"all 1.4s cubic-bezier(.4,0,.2,1)"}}
          />
          <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="central"
            style={{fontFamily:"'Playfair Display',serif",fontSize:"10px",fontWeight:700,fill:niv.color}}>
            {Math.round(globalPct*100)}%
          </text>
          {/* Labels axes */}
          {dims.map((d,i) => {
            const lp = labelPt(i);
            const a = angle(i) * 180 / Math.PI;
            const isTop = Math.abs(a + 90) < 30;
            const isBottom = Math.abs(a - 90) < 30 || Math.abs(a + 270) < 30;
            const anchor = isTop || isBottom ? "middle" : lp.x > cx ? "start" : "end";
            const s = getDimScore(rep, d.id);
            const max = getDimMax(d.id);
            return (
              <g key={d.id}>
                <text x={lp.x} y={lp.y - 5} textAnchor={anchor}
                  style={{fontFamily:"'Outfit',sans-serif",fontSize:"10px",fontWeight:600,fill:d.color}}>
                  {d.label}
                </text>
                <text x={lp.x} y={lp.y + 8} textAnchor={anchor}
                  style={{fontFamily:"'Outfit',sans-serif",fontSize:"9px",fill:"rgba(255,255,255,.4)"}}>
                  {s}/{max}
                </text>
              </g>
            );
          })}
        </svg>
        {/* Légende 2 colonnes */}
        <div style={{width:"100%",maxWidth:400}}>
          <div style={{fontSize:".68rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"var(--muted)",marginBottom:10}}>Légende</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 16px",marginBottom:12}}>
            {dims.map(d => {
              const s = getDimScore(rep, d.id);
              const max = getDimMax(d.id);
              const pct = Math.round(s/max*100);
              const nv = getDimNiv(s/max);
              return (
                <div key={d.id} style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:d.color,flexShrink:0}}/>
                  <div>
                    <div style={{fontSize:".75rem",fontWeight:600,color:d.color,lineHeight:1.2}}>{d.label}</div>
                    <div style={{fontSize:".68rem",color:"var(--muted)"}}>{pct}% · {nv.label}</div>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{borderTop:"1px solid var(--faint)",paddingTop:10,display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:niv.color,border:`2px solid ${niv.color}`,flexShrink:0}}/>
            <div>
              <div style={{fontSize:".78rem",fontWeight:700,color:niv.color}}>Global : {Math.round(globalPct*100)}%</div>
              <div style={{fontSize:".68rem",color:"var(--muted)"}}>Niveau {niv.num} · {niv.nom}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

      <div style={{textAlign:"center",marginBottom:32,paddingTop:20}}>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:"1.6rem",color:"var(--text)",marginBottom:6}}>Votre diagnostic de transparence</h1>
        <p style={{fontSize:".85rem",color:"var(--muted)"}}>Chapitre 10 · Management Régénératif</p>
      </div>

      {/* ── HERO ── */}
      <div className="result-hero" style={{borderColor:`${niv.color}30`}}>
        <div className="result-hero-bg" style={{color:niv.color}}>{niv.num}</div>
        <div className="result-niv-tag" style={{background:niv.bg,color:niv.color,border:`1px solid ${niv.color}40`}}>
          Niveau {niv.num} · {niv.nom}
        </div>
        <div className="result-niv-name" style={{color:niv.color,fontSize:"clamp(1.6rem,5vw,2.8rem)"}}>{profil.icon} {profil.titre}</div>
        <div style={{fontSize:".82rem",color:"var(--muted)",marginBottom:8,fontStyle:"italic"}}>{niv.sousTitre}</div>
        <div className="result-score">{score} points / 150</div>
        <div className="result-scorebar">
          <div className="result-scorefill" style={{width:Math.round((score/150)*100)+"%",background:niv.color}} />
        </div>

        {/* Signal caractéristique centré sous le score */}
        <div style={{fontSize:".84rem",color:"var(--muted)",margin:"16px auto 18px",fontStyle:"italic",maxWidth:500,textAlign:"center",lineHeight:1.65}}>
          {profil.signal}
        </div>

        <div className="result-desc">{niv.desc}</div>
        <div className="result-action" style={{borderColor:`${niv.color}40`,background:niv.bg}}>
          <div className="result-action-label" style={{color:niv.color}}>Action cette semaine</div>
          <p style={{color:"var(--text)",fontSize:".88rem"}}>{niv.action}</p>
        </div>
        {/* TÉLÉCHARGEMENT WORD avec confirmation */}
        <button className="btn btn-dl" onClick={()=>setConfirmDl(true)} style={{marginTop:4}}>
          ↓ Télécharger le rapport Word
        </button>
        <p style={{fontSize:".7rem",color:"var(--muted)",marginTop:8}}>
          Profil · Radar · Scores · Directive · Préconisations détaillées
        </p>
      </div>

      {/* ── MODALE CONFIRMATION ── */}
      {confirmDl && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
          <div style={{background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:16,padding:"32px 28px",maxWidth:420,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:"1.8rem",marginBottom:12}}>↓</div>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:"1.2rem",color:"var(--text)",marginBottom:10}}>Télécharger le rapport Word ?</h3>
            <p style={{fontSize:".85rem",color:"var(--muted)",lineHeight:1.7,marginBottom:22}}>
              Le document inclut votre profil de manager, le radar des 5 dimensions, votre positionnement sur la directive (UE) 2023/970 et vos 3 préconisations détaillées avec étapes concrètes.
            </p>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button className="btn btn-sec" onClick={()=>setConfirmDl(false)}>Annuler</button>
              <button className="btn btn-dl" onClick={()=>{generateWord(rep);setConfirmDl(false);}}>Oui, télécharger</button>
            </div>
          </div>
        </div>
      )}

      {/* ── RADAR ── */}
      <RadarChart rep={rep} niv={niv} />

      {/* ── TABS ── */}
      <div className="res-tabs">
        {[["profil",`◉ ${profil.titre.split(" ").slice(0,3).join(" ")}…`],["synthese","◈ Par dimension"],["directive","⚖ Directive 2026"],["recos","◎ Préconisations"],["detail","≡ Détail"]].map(([t,l])=>(
          <button key={t} className={`res-tab ${resTab===t?"active":""}`} onClick={()=>setResTab(t)}>{l}</button>
        ))}
      </div>

      {/* ── 1. PROFIL DE MANAGER ── */}
      {resTab==="profil" && (
        <div>
          <div style={{background:"var(--bg2)",border:`1px solid ${niv.color}30`,borderRadius:16,padding:"32px 28px",marginBottom:16}}>
            <div style={{fontSize:".7rem",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:niv.color,marginBottom:10}}>Votre profil de manager · Niveau {niv.num}</div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"1.6rem",color:"var(--text)",marginBottom:16,letterSpacing:"-.01em"}}>{profil.icon} {profil.titre}</h2>
            <p style={{fontSize:".93rem",color:"var(--muted)",lineHeight:1.8,marginBottom:20}}>{profil.desc}</p>
            <div style={{background:`${niv.color}10`,border:`1px solid ${niv.color}30`,borderRadius:10,padding:"14px 18px"}}>
              <div style={{fontSize:".68rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:niv.color,marginBottom:6}}>Signal caractéristique</div>
              <p style={{fontSize:".86rem",color:"var(--text)",fontStyle:"italic",lineHeight:1.65}}>{profil.signal}</p>
            </div>
          </div>

          {/* Positionnement sur l'échelle */}
          <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:14,padding:"24px 28px",marginBottom:16}}>
            <div style={{fontSize:".72rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:"var(--muted)",marginBottom:16}}>L'échelle des 6 profils</div>
            {NIVEAUX.map(n=>(
              <div key={n.num} style={{display:"flex",alignItems:"flex-start",gap:14,padding:"10px 0",borderBottom:"1px solid var(--faint)",opacity:n.num===niv.num?1:.45}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:n.num===niv.num?n.color:"var(--faint)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:".85rem",color:n.num===niv.num?"var(--bg)":"var(--muted)"}}>
                  {n.num}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:".82rem",fontWeight:600,color:n.num===niv.num?n.color:"var(--muted)",marginBottom:2}}>
                    {PROFILS_MANAGER[n.num]?.icon} {PROFILS_MANAGER[n.num]?.titre}
                    {n.num===niv.num && <span style={{fontSize:".65rem",background:n.color,color:"var(--bg)",padding:"2px 8px",borderRadius:10,marginLeft:8,fontWeight:700}}>VOUS</span>}
                  </div>
                  <div style={{fontSize:".76rem",color:"var(--muted)",lineHeight:1.5,marginBottom:2}}>{n.sousTitre}</div>
                  <div style={{fontSize:".72rem",color:"var(--muted)",opacity:.7,lineHeight:1.4}}>{n.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── 2. SYNTHÈSE PAR DIMENSION ── */}
      {resTab==="synthese" && (
        <div className="dim-scores-card">
          <h2>Profil par dimension</h2>
          {DIMENSIONS.map(d=>{
            const s=getDimScore(rep,d.id),max=getDimMax(d.id),pct=s/max,nv=getDimNiv(pct);
            return (
              <div key={d.id} className="ds-row">
                <div className="ds-head">
                  <div className="ds-name" style={{color:d.color}}>{d.icon} {d.label} <span style={{fontSize:".7rem",color:"var(--muted)",fontWeight:400}}>{d.chapRef}</span></div>
                  <div className="ds-val" style={{color:nv.color}}>{s}/{max}</div>
                </div>
                <div className="ds-bar"><div className="ds-fill" style={{width:Math.round(pct*100)+"%",background:d.color}} /></div>
                <div className="ds-niv" style={{color:nv.color}}>{nv.label}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── 3. DIRECTIVE ── */}
      {resTab==="directive" && (
        <div>
          <div style={{background:"var(--bg2)",border:"1px solid rgba(74,144,208,.3)",borderRadius:16,padding:"28px",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <div style={{width:36,height:36,borderRadius:8,background:"rgba(74,144,208,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem"}}>⚖</div>
              <div>
                <div style={{fontSize:".68rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:"#4A90D0"}}>Directive (UE) 2023/970 · Échéance juin 2026</div>
                <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"1.15rem",color:"var(--text)",marginTop:2}}>{directive.titre}</h2>
              </div>
            </div>
            <p style={{fontSize:".9rem",color:"var(--muted)",lineHeight:1.8,marginBottom:18}}>{directive.texte}</p>
            <div style={{background:"rgba(74,144,208,.1)",border:"1px solid rgba(74,144,208,.25)",borderRadius:10,padding:"14px 18px"}}>
              <div style={{fontSize:".68rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"#4A90D0",marginBottom:6}}>
                {niv.num<=2 ? "Votre priorité réglementaire" : niv.num<=3 ? "Votre priorité réglementaire" : "Votre opportunité"}
              </div>
              <p style={{fontSize:".86rem",color:"var(--text)",lineHeight:1.65}}>{directive.urgence}</p>
            </div>
          </div>

          {/* Tableau des obligations */}
          <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:14,padding:"22px 24px",marginBottom:16}}>
            <div style={{fontSize:".72rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",color:"var(--muted)",marginBottom:16}}>Ce que la directive impose concrètement</div>
            {[
              { ob:"Afficher une fourchette salariale dans les offres d'emploi", niv:3, label:"Niveau 3 requis" },
              { ob:"Interdire de demander l'historique salarial des candidats", niv:1, label:"Dès le niveau 1" },
              { ob:"Permettre aux salariés d'accéder aux niveaux moyens de rémunération par sexe", niv:3, label:"Niveau 3 requis" },
              { ob:"Justifier les écarts de rémunération supérieurs à 5%", niv:3, label:"Niveau 3 requis" },
              { ob:"Publier des rapports d'écarts F/H (entreprises 100+)", niv:3, label:"Niveau 3 requis" },
              { ob:"Répondre sous 2 mois aux demandes d'information salariale", niv:2, label:"Dès le niveau 2" },
            ].map((item,i)=>{
              const done = niv.num >= item.niv;
              return (
                <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid var(--faint)"}}>
                  <div style={{width:22,height:22,borderRadius:"50%",background:done?"#5AAA60":"var(--faint)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:".7rem",color:done?"var(--bg)":"var(--muted)",fontWeight:700}}>
                    {done?"✓":"·"}
                  </div>
                  <div style={{flex:1,fontSize:".82rem",color:done?"var(--text)":"var(--muted)"}}>{item.ob}</div>
                  <div style={{fontSize:".65rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".04em",color:done?"#5AAA60":"var(--muted)",flexShrink:0}}>{item.label}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── 4. PRÉCONISATIONS ── */}
      {resTab==="recos" && (
        <div>
          <div className="conseil-box" style={{borderColor:`${niv.color}40`,background:niv.bg,marginBottom:20}}>
            <div className="conseil-box-label" style={{color:niv.color}}>Conseil stratégique · Niveau {niv.num}</div>
            <p style={{color:"var(--text)"}}>{niv.conseil}</p>
          </div>
          {recos.map((r,i)=>(
            <div key={i} className="reco-card" style={{borderLeftColor:r.c,marginBottom:14}}>
              <h3 style={{marginBottom:12}}>
                <div className="step-dot" style={{background:r.c,color:"var(--bg)"}}>{i+1}</div>
                {r.t}
              </h3>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {r.etapes.map((e,j)=>(
                  <div key={j} style={{display:"flex",gap:10,fontSize:".84rem",color:"var(--muted)",lineHeight:1.6}}>
                    <div style={{width:20,height:20,borderRadius:"50%",background:`${r.c}20`,border:`1px solid ${r.c}50`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:".65rem",fontWeight:700,color:r.c,marginTop:2}}>
                      {j+1}
                    </div>
                    <span>{e}</span>
                  </div>
                ))}
              </div>
            </div>
          ))}

          {/* CTA Benjamin */}
          <div style={{background:"linear-gradient(135deg,rgba(90,170,96,.12),rgba(74,144,208,.12))",border:"1px solid rgba(90,170,96,.25)",borderRadius:16,padding:"28px 28px",marginTop:24,textAlign:"center"}}>
            <div style={{fontSize:"1.5rem",marginBottom:10}}>✦</div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"1.3rem",color:"var(--text)",marginBottom:10}}>Vous souhaitez aller plus loin ?</h2>
            <p style={{fontSize:".88rem",color:"var(--muted)",marginBottom:18,maxWidth:480,margin:"0 auto 18px",lineHeight:1.75}}>
              Benjamin Chaminade accompagne les managers et les organisations dans leur transformation vers un management régénératif. Diagnostic approfondi, parcours sur-mesure, conférences et ateliers.
            </p>
            <a href="https://benjaminchaminade.com/contact/" target="_blank" rel="noopener noreferrer"
              style={{display:"inline-flex",alignItems:"center",gap:8,padding:"13px 28px",background:"#5AAA60",color:"#0D1A0F",borderRadius:10,fontFamily:"'Outfit',sans-serif",fontWeight:700,fontSize:".92rem",textDecoration:"none",transition:"all .2s"}}>
              Contacter Benjamin Chaminade →
            </a>
            <p style={{fontSize:".7rem",color:"var(--muted)",marginTop:10}}>benjaminchaminade.com</p>
          </div>
        </div>
      )}

      {/* ── 5. DÉTAIL ── */}
      {resTab==="detail" && DIMENSIONS.map(d=>{
        const dq=QUESTIONS.filter(q=>q.dim===d.id);
        return (
          <div key={d.id} className="det-section" style={{borderColor:`${d.color}25`}}>
            <div className="det-section-head" style={{color:d.color}}>{d.icon} {d.label}</div>
            {dq.map(q=>{
              const v=rep[q.id]||0,e=ECHELLE.find(e=>e.val===v);
              return (
                <div key={q.id} className="det-row">
                  <div className="det-dot" style={{background:e?e.bg:"var(--faint)",color:"#fff"}}>{v}</div>
                  <div className="det-txt">{q.texte}</div>
                  <div className="det-val" style={{color:e?e.bg:"var(--muted)"}}>{e?e.label:"·"}</div>
                </div>
              );
            })}
          </div>
        );
      })}

      <div style={{textAlign:"center",marginTop:32,display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
        <button className="btn btn-dl" onClick={()=>setConfirmDl(true)}>↓ Rapport Word</button>
        <a href="https://benjaminchaminade.com/contact/" target="_blank" rel="noopener noreferrer"
          style={{display:"inline-flex",alignItems:"center",gap:8,padding:"11px 24px",background:"var(--n3)",color:"#0D1A0F",borderRadius:10,fontFamily:"'Outfit',sans-serif",fontWeight:700,fontSize:".88rem",textDecoration:"none",transition:"all .2s"}}>
          Contacter Benjamin Chaminade →
        </a>
        <button className="btn btn-sec" onClick={()=>{setRep({});setDim("operationnelle");setPhase("intro");setResTab("profil");setConfirmDl(false);}}>Recommencer</button>
      </div>

      <div className="foot" style={{color:"#C8C5BE",fontSize:".7rem"}}>
        Management Régénératif · Benjamin Chaminade<br/>
        Chapitre 10 · Coconstruire le présent · <a href="https://benjaminchaminade.com/contact/" target="_blank" rel="noopener noreferrer" style={{color:"#C8C5BE"}}>Contact</a>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
